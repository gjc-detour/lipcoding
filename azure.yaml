name: lipcoding-productivity
metadata:
  template: lipcoding-productivity@0.0.1
services:
  web:
    project: .
    language: ts
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true
  worker:
    project: .
    language: ts
    host: containerapp
    docker:
      path: worker/Dockerfile
      remoteBuild: true
